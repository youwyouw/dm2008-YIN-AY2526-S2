<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>听听那冷雨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #080a0d; }
    canvas { display: block; }
    #cam-video {
      position: fixed; opacity: 0; pointer-events: none; width: 1px; height: 1px;
    }
    #hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(80, 140, 180, 0.35); font-family: 'Noto Sans SC', sans-serif;
      font-size: 11px; letter-spacing: 0.2em; pointer-events: none;
      user-select: none; transition: opacity 2s ease;
    }
    #debug {
      position: fixed; top: 12px; left: 12px;
      color: rgba(80, 160, 200, 0.65); font-family: monospace; font-size: 10px;
      line-height: 1.8; background: rgba(0,0,0,0.4); padding: 6px 10px;
      border-radius: 4px; display: none;
    }
  </style>
</head>
<body>
<video id="cam-video" autoplay muted playsinline></video>
<div id="hint">Extend hand into frame, open palm to stir the text.</div>
<div id="debug"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script src="state.js"></script>
<script src="sketch.js"></script>
</body>
</html>
